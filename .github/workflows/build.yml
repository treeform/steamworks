name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - name: Install dependencies
        shell: bash
        run: |
          cd ..
          nimby install -g "${{ github.event.repository.name }}/${{ github.event.repository.name }}.nimble"
      - name: Compile tests
        run: |
          nim c tests/test.nim
          nim c tests/test2.nim
